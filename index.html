<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ApexTutor — Admin Dashboard</title>
<link rel="icon" type="image/png" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --border: #222222;
  --border2: #2a2a2a;
  --purple: #7c3aed;
  --purple2: #a78bfa;
  --green: #22c55e;
  --orange: #f59e0b;
  --red: #ef4444;
  --cyan: #06b6d4;
  --text: #f5f5f5;
  --text2: #888888;
  --text3: #444444;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.login-box {
  width: 100%; max-width: 360px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px 24px;
}
.login-logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 28px;
}
.login-logo-mark {
  width: 36px; height: 36px;
  background: var(--purple);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.login-logo-text {
  font-family: var(--mono);
  font-size: 16px; font-weight: 600;
  letter-spacing: -0.5px;
}
.login-logo-text span { color: var(--purple2); }
.login-label {
  font-size: 11px; font-weight: 600; letter-spacing: 2px;
  color: var(--text2); text-transform: uppercase;
  margin-bottom: 8px; display: block;
}
.login-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 12px 14px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  outline: none;
  margin-bottom: 16px;
  transition: border 0.2s;
}
.login-input:focus { border-color: var(--purple); }
.login-btn {
  width: 100%;
  background: var(--purple);
  color: #fff;
  font-family: var(--sans);
  font-size: 14px; font-weight: 600;
  padding: 12px;
  border: none; border-radius: 8px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.login-btn:hover { opacity: 0.85; }
.login-err {
  color: var(--red);
  font-size: 12px;
  margin-top: 10px;
  text-align: center;
  display: none;
}

/* ── MAIN APP ── */
#app { display: none; }

/* ── TOP BAR ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-logo {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 14px; font-weight: 600;
}
.topbar-logo-dot {
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.topbar-right {
  display: flex; align-items: center; gap: 10px;
}
.topbar-time {
  font-family: var(--mono);
  font-size: 11px; color: var(--text2);
}
.topbar-refresh {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text2);
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.2s;
}
.topbar-refresh:hover { border-color: var(--purple); color: var(--text); }

/* ── CONTENT ── */
.content { padding: 16px; max-width: 600px; margin: 0 auto; }

/* ── STATS GRID ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}
.stat-card.wide { grid-column: 1 / -1; }
.stat-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--text2); margin-bottom: 8px;
}
.stat-value {
  font-family: var(--mono);
  font-size: 28px; font-weight: 600;
  line-height: 1;
}
.stat-sub {
  font-size: 11px; color: var(--text2); margin-top: 4px;
}

/* ── SECTION ── */
.section { margin-bottom: 20px; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.section-title {
  font-size: 11px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--text2);
}
.section-count {
  font-family: var(--mono);
  font-size: 11px; color: var(--text3);
}

/* ── SEARCH ── */
.search-wrap { position: relative; margin-bottom: 12px; }
.search-input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px 10px 36px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
  transition: border 0.2s;
}
.search-input:focus { border-color: var(--purple); }
.search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3); font-size: 14px;
}

/* ── USER CARD ── */
.user-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.user-card:hover { border-color: var(--border2); }
.user-card.expanded { border-color: var(--purple); }
.user-card-header {
  display: flex; align-items: center; gap: 12px;
}
.user-avatar {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 14px; font-weight: 600;
  flex-shrink: 0;
  color: var(--purple2);
}
.user-info { flex: 1; min-width: 0; }
.user-name {
  font-size: 14px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.user-email {
  font-family: var(--mono);
  font-size: 10px; color: var(--text2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.user-badge {
  font-family: var(--mono);
  font-size: 10px; font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge-trial { background: rgba(245,158,11,0.15); color: var(--orange); border: 1px solid rgba(245,158,11,0.3); }
.badge-monthly { background: rgba(124,58,237,0.15); color: var(--purple2); border: 1px solid rgba(124,58,237,0.3); }
.badge-annual { background: rgba(6,182,212,0.15); color: var(--cyan); border: 1px solid rgba(6,182,212,0.3); }
.badge-lifetime { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
.badge-expired { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

.user-meta {
  display: flex; gap: 12px;
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text2);
}
.user-meta span { display: flex; align-items: center; gap: 4px; }

/* ── EXPAND DETAIL ── */
.user-detail {
  display: none;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.user-detail.show { display: block; }
.detail-row {
  display: flex; justify-content: space-between;
  font-size: 12px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.detail-row:last-child { border-bottom: none; }
.detail-key { color: var(--text2); }
.detail-val { font-family: var(--mono); color: var(--text); font-size: 11px; }

/* ── UPGRADE CONTROLS ── */
.upgrade-section {
  margin-top: 12px;
  background: var(--bg3);
  border-radius: 8px;
  padding: 12px;
}
.upgrade-title {
  font-size: 11px; font-weight: 600;
  color: var(--text2); margin-bottom: 10px;
  letter-spacing: 1px; text-transform: uppercase;
}
.plan-btns {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.plan-btn {
  font-family: var(--mono);
  font-size: 11px; font-weight: 600;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--bg2);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}
.plan-btn:hover { border-color: var(--purple); color: var(--text); }
.plan-btn.monthly:hover { border-color: var(--purple2); color: var(--purple2); }
.plan-btn.annual:hover { border-color: var(--cyan); color: var(--cyan); }
.plan-btn.lifetime:hover { border-color: var(--green); color: var(--green); }
.plan-btn.expired:hover { border-color: var(--red); color: var(--red); }
.upgrade-result {
  font-size: 11px; margin-top: 8px;
  font-family: var(--mono);
  display: none;
}

/* ── EXPIRING SOON ── */
.expiry-card {
  background: rgba(239,68,68,0.05);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
}
.expiry-days {
  font-family: var(--mono);
  font-size: 20px; font-weight: 600;
  color: var(--red); min-width: 40px;
  text-align: center;
}
.expiry-info { flex: 1; }
.expiry-name { font-size: 13px; font-weight: 600; }
.expiry-email { font-size: 10px; color: var(--text2); font-family: var(--mono); }
.expiry-btn {
  font-size: 11px; font-family: var(--mono);
  padding: 5px 10px;
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  color: var(--red);
  border-radius: 6px; cursor: pointer;
  transition: all 0.2s;
}
.expiry-btn:hover { background: var(--red); color: #fff; }

/* ── REVENUE ── */
.revenue-bar {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
}
.rev-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.rev-row:last-child { margin-bottom: 0; }
.rev-label { font-size: 12px; color: var(--text2); width: 80px; flex-shrink: 0; }
.rev-bar-wrap { flex: 1; background: var(--bg3); border-radius: 4px; height: 6px; overflow: hidden; }
.rev-bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
.rev-val { font-family: var(--mono); font-size: 12px; color: var(--text); width: 70px; text-align: right; flex-shrink: 0; }

/* ── LOADING ── */
.loading {
  text-align: center; padding: 40px 20px;
  color: var(--text2);
}
.loading-dots {
  display: inline-flex; gap: 4px; margin-bottom: 12px;
}
.loading-dots span {
  width: 6px; height: 6px;
  background: var(--purple);
  border-radius: 50%;
  animation: dot-bounce 1.2s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }

/* ── EMPTY ── */
.empty { text-align: center; padding: 30px 20px; color: var(--text3); font-size: 13px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 18px;
  font-size: 13px;
  z-index: 9999;
  opacity: 0; transition: opacity 0.3s;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <img src="icon-192.png" style="width:40px;height:40px;border-radius:10px;object-fit:cover">
      <div class="login-logo-text">Apex<span>Tutor</span> <span style="color:var(--text3);font-weight:400">admin</span></div>
    </div>
    <label class="login-label">Admin Key</label>
    <input type="password" id="admin-key-input" class="login-input" placeholder="Masukkan admin key..." onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Masuk Dashboard →</button>
    <div class="login-err" id="login-err">❌ Admin key tidak sah</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-dot"></div>
      <img src="icon-192.png" style="width:26px;height:26px;border-radius:6px;object-fit:cover">
      <span style="font-family:var(--mono);font-size:13px">Apex<span style="color:var(--purple2)">Tutor</span> <span style="color:var(--text3);font-size:11px">admin</span></span>
    </div>
    <div class="topbar-right">
      <span class="topbar-time" id="top-time"></span>
      <button class="topbar-refresh" onclick="loadAll()">↻ Refresh</button>
      <button class="topbar-refresh" onclick="doLogout()" style="color:var(--red)">Keluar</button>
    </div>
  </div>

  <div class="content">

    <!-- STATS OVERVIEW -->
    <div class="stats-grid" id="stats-grid">
      <div class="loading" style="grid-column:1/-1">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <div>Memuatkan data...</div>
      </div>
    </div>

    <!-- EXPIRING SOON -->
    <div class="section" id="expiring-section" style="display:none">
      <div class="section-header">
        <div class="section-title">⚠️ Nak Expired</div>
        <div class="section-count" id="expiring-count"></div>
      </div>
      <div id="expiring-list"></div>
    </div>

    <!-- REVENUE ESTIMATE -->
    <div class="section" id="revenue-section" style="display:none">
      <div class="section-header">
        <div class="section-title">💰 Anggaran Hasil</div>
      </div>
      <div class="revenue-bar" id="revenue-bar"></div>
    </div>

    <!-- USERS LIST -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">👥 Semua Users</div>
        <div class="section-count" id="users-count"></div>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" placeholder="Cari nama atau email..." oninput="filterUsers(this.value)" id="search-input">
      </div>
      <div id="users-list">
        <div class="loading">
          <div class="loading-dots"><span></span><span></span><span></span></div>
          <div>Memuatkan users...</div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = 'https://api.apextutor.my';
let ADMIN_KEY = '';
let allUsers = [];

// ── AUTH ──
function doLogin() {
  const key = document.getElementById('admin-key-input').value.trim();
  if (!key) return;
  ADMIN_KEY = key;
  localStorage.setItem('apex_admin_key', key);
  loadAll();
}

function doLogout() {
  localStorage.removeItem('apex_admin_key');
  ADMIN_KEY = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-key-input').value = '';
}

// ── CLOCK ──
function updateClock() {
  const el = document.getElementById('top-time');
  if (el) el.textContent = new Date().toLocaleTimeString('ms-MY', { hour: '2-digit', minute: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// ── LOAD ALL ──
async function loadAll() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // Show loading
  document.getElementById('stats-grid').innerHTML = `
    <div class="loading" style="grid-column:1/-1">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div>Memuatkan data...</div>
    </div>`;
  document.getElementById('users-list').innerHTML = `
    <div class="loading">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div>Memuatkan users...</div>
    </div>`;

  try {
    const res = await fetch(`${API_BASE}/admin/list-users?admin_key=${encodeURIComponent(ADMIN_KEY)}`);
    const data = await res.json();

    if (!data.success) {
      if (res.status === 401) {
        showToast('❌ Admin key salah!');
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
        const errEl = document.getElementById('login-err');
        if (errEl) errEl.style.display = 'block';
        return;
      }
      throw new Error(data.error || 'Gagal load data');
    }

    allUsers = data.users || [];
    renderStats(data);
    renderExpiring(allUsers);
    renderRevenue(allUsers);
    renderUsers(allUsers);

  } catch(e) {
    document.getElementById('stats-grid').innerHTML = `<div class="empty" style="grid-column:1/-1">❌ Error: ${e.message}</div>`;
    document.getElementById('users-list').innerHTML = `<div class="empty">Gagal load. Cuba refresh.</div>`;
  }
}

// ── RENDER STATS ──
function renderStats(data) {
  const users = data.users || [];
  const byPlan = { trial: 0, monthly: 0, annual: 0, lifetime: 0, expired: 0 };
  users.forEach(u => { if (byPlan[u.plan] !== undefined) byPlan[u.plan]++; });
  const totalRev = byPlan.monthly * 49 + byPlan.annual * 500;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Users</div>
      <div class="stat-value" style="color:var(--purple2)">${data.total || 0}</div>
      <div class="stat-sub">pelajar berdaftar</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Aktif</div>
      <div class="stat-value" style="color:var(--green)">${data.active_count || 0}</div>
      <div class="stat-sub">${data.expired_count || 0} expired</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Paid Users</div>
      <div class="stat-value" style="color:var(--cyan)">${byPlan.monthly + byPlan.annual + byPlan.lifetime}</div>
      <div class="stat-sub">monthly + annual + lifetime</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Est. Hasil/Bulan</div>
      <div class="stat-value" style="color:var(--orange)">RM${totalRev}</div>
      <div class="stat-sub">berdasarkan plan aktif</div>
    </div>
    <div class="stat-card wide" style="display:flex;gap:16px;align-items:center">
      <div style="flex:1">
        <div class="stat-label">Pecahan Plan</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
          ${byPlan.trial ? `<span class="user-badge badge-trial">trial: ${byPlan.trial}</span>` : ''}
          ${byPlan.monthly ? `<span class="user-badge badge-monthly">monthly: ${byPlan.monthly}</span>` : ''}
          ${byPlan.annual ? `<span class="user-badge badge-annual">annual: ${byPlan.annual}</span>` : ''}
          ${byPlan.lifetime ? `<span class="user-badge badge-lifetime">lifetime: ${byPlan.lifetime}</span>` : ''}
          ${byPlan.expired ? `<span class="user-badge badge-expired">expired: ${byPlan.expired}</span>` : ''}
        </div>
      </div>
    </div>`;
}

// ── RENDER EXPIRING ──
function renderExpiring(users) {
  const expiring = users.filter(u =>
    (u.plan === 'trial' || u.plan === 'monthly' || u.plan === 'annual') &&
    u.days_left !== null && u.days_left <= 3 && u.days_left >= 0
  ).sort((a,b) => a.days_left - b.days_left);

  const sec = document.getElementById('expiring-section');
  const list = document.getElementById('expiring-list');
  const cnt = document.getElementById('expiring-count');

  if (expiring.length === 0) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  cnt.textContent = expiring.length + ' user';

  list.innerHTML = expiring.map(u => `
    <div class="expiry-card">
      <div class="expiry-days">${u.days_left}h</div>
      <div class="expiry-info">
        <div class="expiry-name">${u.nama || '-'}</div>
        <div class="expiry-email">${u.email || '-'}</div>
      </div>
      <button class="expiry-btn" onclick="quickUpgrade('${u.email}', 'monthly')">+30 hari</button>
    </div>`).join('');
}

// ── RENDER REVENUE ──
function renderRevenue(users) {
  const monthly = users.filter(u => u.plan === 'monthly').length;
  const annual = users.filter(u => u.plan === 'annual').length;
  const lifetime = users.filter(u => u.plan === 'lifetime').length;

  const revMonthly = monthly * 49;
  const revAnnual = annual * (500/12);
  const total = revMonthly + revAnnual;
  const maxBar = Math.max(revMonthly, revAnnual, 1);

  const sec = document.getElementById('revenue-section');
  const bar = document.getElementById('revenue-bar');

  if (total === 0) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';

  bar.innerHTML = `
    <div class="rev-row">
      <div class="rev-label" style="color:var(--purple2)">Monthly</div>
      <div class="rev-bar-wrap"><div class="rev-bar-fill" style="width:${(revMonthly/maxBar*100).toFixed(0)}%;background:var(--purple)"></div></div>
      <div class="rev-val">RM${revMonthly}</div>
    </div>
    <div class="rev-row">
      <div class="rev-label" style="color:var(--cyan)">Annual</div>
      <div class="rev-bar-wrap"><div class="rev-bar-fill" style="width:${(revAnnual/maxBar*100).toFixed(0)}%;background:var(--cyan)"></div></div>
      <div class="rev-val">RM${revAnnual.toFixed(0)}/bln</div>
    </div>
    <div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:var(--text2)">Jumlah anggaran/bulan</span>
      <span style="font-family:var(--mono);font-size:18px;font-weight:600;color:var(--orange)">RM${total.toFixed(0)}</span>
    </div>`;
}

// ── RENDER USERS ──
function renderUsers(users) {
  const list = document.getElementById('users-list');
  const cnt = document.getElementById('users-count');
  cnt.textContent = users.length + ' user';

  if (users.length === 0) {
    list.innerHTML = '<div class="empty">Tiada user lagi</div>';
    return;
  }

  list.innerHTML = users.map((u, i) => {
    const initials = (u.nama || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
    const daysText = u.days_left !== null
      ? (u.plan === 'trial' ? `${u.days_left}h trial` : `${u.days_left}h lagi`)
      : (u.plan === 'lifetime' ? 'lifetime ♾' : '-');

    return `
    <div class="user-card" onclick="toggleUser(this, ${i})" data-idx="${i}">
      <div class="user-card-header">
        <div class="user-avatar">${initials}</div>
        <div class="user-info">
          <div class="user-name">${u.nama || 'Tiada nama'}</div>
          <div class="user-email">${u.email || '-'}</div>
        </div>
        <span class="user-badge badge-${u.plan || 'trial'}">${u.plan || 'trial'}</span>
      </div>
      <div class="user-meta">
        <span>📚 ${u.total_sesi || 0} sesi</span>
        <span>⏱️ ${daysText}</span>
        <span>📅 ${u.tarikh_daftar || '-'}</span>
      </div>
      <div class="user-detail" id="detail-${i}">
        <div class="detail-row"><span class="detail-key">Email</span><span class="detail-val">${u.email || '-'}</span></div>
        <div class="detail-row"><span class="detail-key">Plan</span><span class="detail-val">${u.plan || '-'}</span></div>
        <div class="detail-row"><span class="detail-key">Status</span><span class="detail-val">${u.status === 'active' ? '✅ Aktif' : '❌ Expired'}</span></div>
        <div class="detail-row"><span class="detail-key">Days Left</span><span class="detail-val">${u.days_left !== null ? u.days_left + ' hari' : u.plan === 'lifetime' ? '♾ lifetime' : '-'}</span></div>
        <div class="detail-row"><span class="detail-key">Subjek</span><span class="detail-val">${u.subjek || '-'}</span></div>
        <div class="detail-row"><span class="detail-key">Total Sesi</span><span class="detail-val">${u.total_sesi || 0}</span></div>
        <div class="detail-row"><span class="detail-key">Daftar</span><span class="detail-val">${u.tarikh_daftar || '-'}</span></div>

        <div class="upgrade-section">
          <div class="upgrade-title">Tukar Plan</div>
          <div class="plan-btns">
            <button class="plan-btn trial" onclick="upgradePlan(event, '${u.email}', 'trial')">trial</button>
            <button class="plan-btn monthly" onclick="upgradePlan(event, '${u.email}', 'monthly')">monthly +30h</button>
            <button class="plan-btn annual" onclick="upgradePlan(event, '${u.email}', 'annual')">annual +365h</button>
            <button class="plan-btn lifetime" onclick="upgradePlan(event, '${u.email}', 'lifetime')">lifetime</button>
            <button class="plan-btn expired" onclick="upgradePlan(event, '${u.email}', 'expired')">expired</button>
          </div>
          <div class="upgrade-result" id="upg-result-${i}"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── TOGGLE USER EXPAND ──
function toggleUser(el, idx) {
  const detail = document.getElementById(`detail-${idx}`);
  const isExpanded = detail.classList.contains('show');
  // Close all
  document.querySelectorAll('.user-detail.show').forEach(d => d.classList.remove('show'));
  document.querySelectorAll('.user-card.expanded').forEach(c => c.classList.remove('expanded'));
  // Toggle this
  if (!isExpanded) {
    detail.classList.add('show');
    el.classList.add('expanded');
  }
}

// ── FILTER USERS ──
function filterUsers(q) {
  if (!q) { renderUsers(allUsers); return; }
  const filtered = allUsers.filter(u =>
    (u.nama || '').toLowerCase().includes(q.toLowerCase()) ||
    (u.email || '').toLowerCase().includes(q.toLowerCase())
  );
  renderUsers(filtered);
}

// ── UPGRADE PLAN ──
async function upgradePlan(e, email, plan) {
  e.stopPropagation();
  if (!email) { showToast('❌ Tiada email'); return; }
  if (!confirm(`Tukar ${email} → ${plan}?`)) return;

  const btn = e.target;
  btn.textContent = '⏳';

  try {
    const res = await fetch(`${API_BASE}/admin/update-plan`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ admin_key: ADMIN_KEY, email, plan }),
    });
    const data = await res.json();

    if (data.success) {
      showToast('✅ Plan updated!');
      // Update local data
      const u = allUsers.find(u => u.email === email);
      if (u) {
        u.plan = plan;
        u.status = plan === 'expired' ? 'expired' : 'active';
      }
      setTimeout(() => loadAll(), 500);
    } else {
      showToast('❌ ' + (data.error || 'Gagal'));
      btn.textContent = plan;
    }
  } catch(err) {
    showToast('❌ Error: ' + err.message);
    btn.textContent = plan;
  }
}

// ── QUICK UPGRADE ──
async function quickUpgrade(email, plan) {
  if (!confirm(`Extend ${email} → ${plan}?`)) return;
  try {
    const res = await fetch(`${API_BASE}/admin/update-plan`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ admin_key: ADMIN_KEY, email, plan }),
    });
    const data = await res.json();
    if (data.success) { showToast('✅ Extended!'); loadAll(); }
    else showToast('❌ ' + data.error);
  } catch(e) { showToast('❌ Error'); }
}

// ── TOAST ──
function showToast(msg, ms = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// ── AUTO LOGIN ──
window.addEventListener('load', () => {
  const saved = localStorage.getItem('apex_admin_key');
  if (saved) { ADMIN_KEY = saved; loadAll(); }
});
</script>
